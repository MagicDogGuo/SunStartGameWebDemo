<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Unity WebGL Player | A101</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">
    <link rel="stylesheet" href="../player-shell.css">
    <script src="TemplateData/UnityProgress.js"></script>  
    <script src="Build/UnityLoader.js"></script>
    <script>
      var gameInstance = UnityLoader.instantiate("gameContainer", "Build/101.json", {onProgress: UnityProgress});
    </script>
  </head>
  <body class="player-page">
    <header class="player-topbar">
      <nav aria-label="Site navigation">
        <a href="../index.html">← Back to demo selection</a>
      </nav>
    </header>
    <div class="player-shell">
      <div class="player-game-panel">
        <div class="webgl-content">
          <div id="gameContainer" style="width: 960px; height: 600px"></div>
          <div class="footer">
            <div class="webgl-logo"></div>
            <div class="fullscreen" onclick="gameInstance.SetFullscreen(1)"></div>
            <div class="title">A101</div>
          </div>
        </div>
      </div>
      <section class="player-desc" aria-label="About this demo">
        <div class="player-desc-text">
          <h2>A101</h2>
          <p>WebGL demo build. Use in-game instructions for controls.</p>
          <p>Layout is for showcase only—replace the screenshot and copy with your own assets.</p>
        </div>
        <div class="player-desc-thumb">
          <img src="../screenshots/101.png" alt="A101 preview thumbnail" width="640" height="360" loading="lazy" decoding="async" />
        </div>
      </section>
    </div>
  </body>
</html>
