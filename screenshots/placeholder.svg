<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img" aria-label="Screenshot placeholder">
  <rect width="640" height="360" fill="#e8eef5"/>
  <rect x="20" y="20" width="600" height="320" rx="8" fill="none" stroke="#9eb0c4" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="320" y="178" text-anchor="middle" fill="#52657a" font-family="Segoe UI, sans-serif" font-size="17">Screenshot</text>
  <text x="320" y="204" text-anchor="middle" fill="#7a8fa3" font-family="Segoe UI, sans-serif" font-size="12">Set src → screenshots/*.png</text>
</svg>
