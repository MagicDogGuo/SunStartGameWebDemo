  <rect x="20" y="20" width="600" height="320" rx="8" fill="none" stroke="#5c6b7e" stroke-width="2" stroke-dasharray="10 8"/>
  <text x="320" y="178" text-anchor="middle" fill="#8a9aae" font-family="Segoe UI, sans-serif" font-size="17">Screenshot</text>
  <text x="320" y="204" text-anchor="middle" fill="#5c6b7e" font-family="Segoe UI, sans-serif" font-size="12">Set src → screenshots/*.png</text>
</svg>
