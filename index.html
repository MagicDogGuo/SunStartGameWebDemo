<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sunstart Education WebGame Demo</title>
    <link rel="stylesheet" href="index.css" />
  </head>
  <body>
    <canvas id="neuron-bg" class="neuron-bg" aria-hidden="true"></canvas>
    <main class="card">
      <h1>Sunstart Education WebGame Demo</h1>
      <p class="subtitle">Choose a build to open its WebGL player.</p>
      <!-- Screenshots: change each img src from screenshots/placeholder.svg to your file, e.g. screenshots/101.png -->
      <nav class="actions" aria-label="WebGL demos">
        <a href="101/index.html" class="demo-card">
          <div class="demo-card-thumb-wrap">
            <img
              class="demo-card-thumb"
              src="screenshots/101.png"
              alt="Level screenshot: demo 101"
              width="640"
              height="360"
              loading="lazy"
              decoding="async"
            />
          </div>
          <span class="demo-card-label">Open 101</span>
        </a>
        <a href="104/index.html" class="demo-card">
          <div class="demo-card-thumb-wrap">
            <img
              class="demo-card-thumb"
              src="screenshots/104.png"
              alt="Level screenshot: demo 104"
              width="640"
              height="360"
              loading="lazy"
              decoding="async"
            />
          </div>
          <span class="demo-card-label">Open 104</span>
        </a>
        <a href="105/index.html" class="demo-card">
          <div class="demo-card-thumb-wrap">
            <img
              class="demo-card-thumb"
              src="screenshots/105.png"
              alt="Level screenshot: demo 105"
              width="640"
              height="360"
              loading="lazy"
              decoding="async"
            />
          </div>
          <span class="demo-card-label">Open 105</span>
        </a>
      </nav>
      <p class="notice">
        For portfolio demonstration only—not for commercial use. Assets and game rights remain with their respective owners.
      </p>
    </main>
    <script type="module" src="./neuron-background.js"></script>
  </body>
</html>
